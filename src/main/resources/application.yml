spring:
  application:
    name: CoreBankingApplication
  datasource:
    url: jdbc:postgresql://localhost:5432/banking
    username: banking
    password: banking
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
jwt:
  secret: "core-banking-platform-secret-key-that-is-at-least-256-bits-long-for-hs256"
  expiration: 86400000

server:
  port: 8080

logging:
  level:
    org.springframework.security.web: DEBUG
    org.springframework.web.filter.CorsFilter: TRACE
    org.springframework.web.cors: TRACE
