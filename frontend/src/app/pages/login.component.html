<div class="flex items-center justify-center min-h-[70vh]">
  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-800">Welcome Back</h1>
      <p class="text-gray-500 mt-2">Sign in to your account</p>
    </div>

    @if (error) {
      <div class="bg-red-50 text-red-700 px-4 py-3 rounded-lg mb-6 text-sm">
        {{ error }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" #form="ngForm" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input
          type="text"
          name="username"
          [(ngModel)]="credentials.username"
          required
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
          placeholder="Enter your username"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="credentials.password"
          required
          class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
          placeholder="Enter your password"
        />
      </div>

      <button
        type="submit"
        [disabled]="form.invalid || loading"
        class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-400 text-white font-medium py-2.5 rounded-lg transition"
      >
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      Don't have an account?
      <a routerLink="/register" class="text-indigo-600 hover:text-indigo-800 font-medium"
        >Register</a
      >
    </p>
  </div>
</div>
